name: Frontend

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validator-sim:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator-sim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: validator-sim/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test
