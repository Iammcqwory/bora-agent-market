name: Slither

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install contract dependencies
        run: |
          forge install foundry-rs/forge-std@v1.9.4
          forge install OpenZeppelin/openzeppelin-contracts@v5.1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      # Run Slither with Foundry available on PATH so it can compile the project.
      # --fail-high exits non-zero only on high-severity findings.
      - name: Run Slither
        run: slither . --filter-paths "lib|script|test" --fail-high
